name: ANGLE Linux Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    strategy:
      fail-fast: false
      matrix:
        target-cpu: [x64, arm64]
        target-os: [linux]

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false
          
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout gl-native-node
        uses: actions/checkout@v4
        with:
            repository: 'maptiler/gl-native-node'
            token: ${{ secrets.GH_PAT }}
            path: gl-native-node
            ref: CL-2818_server-builds

      - name: Checkout MapLibre Native
        uses: actions/checkout@v4
        with:
            repository: 'maptiler/maplibre-native'
            token: ${{ secrets.GH_PAT }}
            ref: 'CL-2994_fix-debug-build'
            path: gl-native-node/maplibre-native
            submodules: 'recursive'

      - name: Build ANGLE
        env:
          ANGLE_TARGET_CPU: ${{ matrix.target-cpu }}
          ANGLE_TARGET_OS: ${{ matrix.target-os }}
        working-directory: gl-native-node
        run: |
          # ./build/linux/sysroot_scripts/install-sysroot.py --arch=arm64
          sed -i 's|gn gen out/Release --args="is_debug=false is_component_build=false"|gn gen out/Release --args="target_cpu=\\"$ANGLE_TARGET_CPU\\" target_os=\\"$ANGLE_TARGET_OS\\" is_debug=false is_component_build=false"|' build-angle.sh
          ./build-angle.sh

      - name: Artifact Preparation
        run: |
          mkdir output
          cp gl-native-node/dist/libEGL.so output/libEGL.so
          cp gl-native-node/dist/libGLESv2.so output/libGLESv2.so
          cp gl-native-node/dist/libvk_swiftshader.so output/libvk_swiftshader.so
          cp gl-native-node/dist/libvulkan.so.1 output/libvulkan.so.1
          cp gl-native-node/dist/vk_swiftshader_icd.json output/vk_swiftshader_icd.json

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: angle-${{ matrix.target-cpu }}-${{ matrix.target-os }}
          path: output/
          retention-days: 1
