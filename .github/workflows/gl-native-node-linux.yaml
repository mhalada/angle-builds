name: gl-native-node Linux Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    strategy:
      fail-fast: false
      matrix:
        target-cpu: [x64]
        target-os: [linux]

    steps:
      - name: Checkout gl-native-node
        uses: actions/checkout@v4
        with:
            repository: 'maptiler/gl-native-node'
            token: ${{ secrets.GH_PAT }}
            path: gl-native-node
            ref: CL-2818_server-builds

      - name: Checkout MapLibre Native
        uses: actions/checkout@v4
        with:
            repository: 'maptiler/maplibre-native'
            token: ${{ secrets.GH_PAT }}
            ref: 'CL-2994_fix-debug-build'
            path: gl-native-node/maplibre-native
            submodules: 'recursive'

      - name: Download ANGLE dependency
        working-directory: gl-native-node
        run: |
          mkdir dist
          wget https://github.com/mhalada/angle-builds/releases/download/v0.0.1/angle-${{ matrix.target-cpu }}-linux.zip -O angle.zip
          unzip angle.zip -d angle
          cp angle/libEGL.so dist/.
          cp angle/libGLESv2.so dist/.
          cp angle/libvk_swiftshader.so dist/.
          cp angle/libvulkan.so.1 dist/.
          cp angle/vk_swiftshader_icd.json dist/.

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          platforms: linux/amd64,linux/arm64

      - name: Update Dockefile
        working-directory: gl-native-node
        if: ${{ matrix.target-cpu == 'arm64' }}
        run: sed -i 's|x86_64|aarch64|' build-ubuntu20.04.Dockerfile

      - name: Build gl-native-node
        working-directory: gl-native-node
        env:
          DOCKER_PLATFORM: ${{ matrix.target-cpu == 'arm64' && 'arm64' || 'amd64' }}
        run: |
          chmod +x ./build-in-docker.sh
          sed -i 's|docker build -t mbgl-$DOCKERIMAGE . -f $DOCKERIMAGE.Dockerfile|docker build --load --platform linux/$DOCKER_PLATFORM -t mbgl-$DOCKERIMAGE . -f $DOCKERIMAGE.Dockerfile|' build-in-docker.sh
          sed -i 's|docker run --rm -v "$(pwd):/workspace" mbgl-$DOCKERIMAGE ./build.sh $ONPREM|docker run --platform linux/$DOCKER_PLATFORM --rm -v "$(pwd):/workspace" mbgl-$DOCKERIMAGE ./build.sh $ONPREM|' build-in-docker.sh
          ./build-in-docker.sh server

      - name: Artifact Preparation
        working-directory: gl-native-node
        run: |
          mkdir ../output
          cp dist/mbgl-node108.node ../output/mbgl-node108-linux-${{ matrix.target-cpu }}.node
          cp dist/mbgl-node115.node ../output/mbgl-node115-linux-${{ matrix.target-cpu }}.node
          cp dist/mbgl-node127.node ../output/mbgl-node127-linux-${{ matrix.target-cpu }}.node
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gl-native-node-${{ matrix.target-cpu }}-${{ matrix.target-os }}
          path: output/
          retention-days: 1

  test:
    runs-on: ubuntu-20.04
    needs: build

    strategy:
      fail-fast: false
      matrix:
        target-cpu: [x64]
        target-os: [linux]

    steps:
      - name: Checkout gl-native-node
        uses: actions/checkout@v4
        with:
            repository: 'maptiler/gl-native-node'
            token: ${{ secrets.GH_PAT }}
            path: gl-native-node
            ref: CL-2818_server-builds

      - name: Download ANGLE dependency
        working-directory: gl-native-node
        run: |
          mkdir dist
          wget https://github.com/mhalada/angle-builds/releases/download/v0.0.1/angle-${{ matrix.target-cpu }}-linux.zip -O angle.zip
          unzip angle.zip -d angle
          cp angle/libEGL.so dist/.
          cp angle/libGLESv2.so dist/.
          cp angle/libvk_swiftshader.so dist/.
          cp angle/libvulkan.so.1 dist/.
          cp angle/vk_swiftshader_icd.json dist/.

      - name: Download gl-native-node binaries
        uses: actions/download-artifact@v4
        with:
          name: gl-native-node-${{ matrix.target-cpu }}-${{ matrix.target-os }}
          path: gl-native-node/dist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          platforms: linux/amd64,linux/arm64

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.2

      - name: Test
        working-directory: gl-native-node
        run: |
          export ANGLE_DEFAULT_PLATFORM=swiftshader
          npm ci --preserve-symlinks
          PLATFORM=ubuntu npm test
